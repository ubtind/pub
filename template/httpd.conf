ServerRoot "{{APACHE_SERVERROOT}}"
Listen {{APACHE_PORT}}
ServerName localhost:{{APACHE_PORT}}

DocumentRoot "{{DOCUMENT_ROOT}}"

<Directory "{{DOCUMENT_ROOT}}">
    Options Indexes FollowSymLinks
    AllowOverride None
    Require all granted
</Directory>

# Basic logging (relative to ServerRoot)
ErrorLog "logs/error.log"
CustomLog "logs/access.log" combined

# Load modules folder (leave vendor defaults intact)
# Include additional config fragments if present
Include conf/extra/*.conf
