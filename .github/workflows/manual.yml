name: Build Portable WAMP + phpMyAdmin Release
on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  BUILD_DIR: local
  ARTIFACT_NAME: local-${{ github.ref_name || 'build-' + github.run_number }}.zip
  APACHE_URL: https://downloads.apache.org//httpd/httpd-2.4.57-win64-vs16.zip
  PHP_URL: https://windows.php.net/downloads/releases/php-8.2.19-Win32-vs16-x64.zip
  MARIADB_URL: https://downloads.mariadb.org/f/mariadb-10.6.13/winx64-packages/mariadb-10.6.13-winx64.zip
  PHPMYADMIN_URL: https://www.phpmyadmin.net/downloads/phpMyAdmin-latest-all-languages.zip
  APACHE_PORT: '8080'
  MYSQL_PORT: '3307'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare build dir
        run: |
          Remove-Item -Recurse -Force $env:BUILD_DIR -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path $env:BUILD_DIR | Out-Null

      - name: Download Apache
        run: |
          Invoke-WebRequest -Uri $env:APACHE_URL -OutFile apache.zip
          Expand-Archive apache.zip -DestinationPath $env:BUILD_DIR\apache

      - name: Download PHP
        run: |
          Invoke-WebRequest -Uri $env:PHP_URL -OutFile php.zip
          Expand-Archive php.zip -DestinationPath $env:BUILD_DIR\php

      - name: Download MariaDB
        run: |
          Invoke-WebRequest -Uri $env:MARIADB_URL -OutFile mariadb.zip
          Expand-Archive mariadb.zip -DestinationPath $env:BUILD_DIR\mysql

      - name: Download phpMyAdmin
        run: |
          Invoke-WebRequest -Uri $env:PHPMYADMIN_URL -OutFile phpmyadmin.zip
          Expand-Archive phpmyadmin.zip -DestinationPath $env:BUILD_DIR\www\phpmyadmin

      - name: Copy app files & templates
        run: |
          if (Test-Path www) { Copy-Item -Path www\* -Destination $env:BUILD_DIR\www -Recurse -Force }
          if (Test-Path template) { Copy-Item -Path template\* -Destination $env:BUILD_DIR -Recurse -Force }

      - name: Apply templates (render placeholders)
        run: |
          $root = (Resolve-Path $env:BUILD_DIR).Path
          $phpDir = (Get-ChildItem $env:BUILD_DIR\php -Directory | Select-Object -First 1).FullName
          $mysqlDir = (Get-ChildItem $env:BUILD_DIR\mysql -Directory | Select-Object -First 1).FullName
          $wwwDir = Join-Path $root 'www'
          New-Item -ItemType Directory -Path $wwwDir -Force | Out-Null

          function Render-Template($tplPath,$outPath,$replacements){
            $text = Get-Content $tplPath -Raw
            foreach ($k in $replacements.Keys) {
              $text = $text -replace [regex]::Escape("{{" + $k + "}}"), [string]$replacements[$k]
            }
            $dir = Split-Path $outPath -Parent
            if (-not (Test-Path $dir)) { New-Item -ItemType Directory -Path $dir -Force | Out-Null }
            $text | Set-Content $outPath -Encoding ASCII
          }

          $repl = @{
            'APACHE_PORT' = $env:APACHE_PORT
            'DOCUMENT_ROOT' = (Resolve-Path $wwwDir).Path
            'MYSQL_PORT' = $env:MYSQL_PORT
            'MYSQL_BASEDIR' = $mysqlDir
            'MYSQL_DATADIR' = Join-Path $mysqlDir 'data'
            'BLOWFISH_SECRET' = [System.Guid]::NewGuid().ToString()
            'APACHE_SERVERROOT' = (Resolve-Path "$root\apache").Path
          }

          $tplRoot = (Resolve-Path "$root\template").Path

          # Render into vendor locations (overwrite vendor files)
          Render-Template "$tplRoot\httpd.conf" "$root\apache\conf\httpd.conf" $repl
          Render-Template "$tplRoot\php.ini" (Join-Path $phpDir 'php.ini') $repl
          Render-Template "$tplRoot\my.ini" (Join-Path $mysqlDir 'my.ini') $repl
          $pmaDir = Join-Path $wwwDir 'phpmyadmin'
          Render-Template "$tplRoot\config.inc.php" (Join-Path $pmaDir 'config.inc.php') $repl
          Render-Template "$tplRoot\start.bat" (Join-Path $root 'start.bat') $repl
          Render-Template "$tplRoot\stop.bat" (Join-Path $root 'stop.bat') $repl

      - name: Initialize MariaDB data dir if empty
        run: |
          $mysqlRoot = Get-ChildItem $env:BUILD_DIR\mysql -Directory | Select-Object -First 1
          $dataDir = Join-Path $mysqlRoot.FullName 'data'
          if (-Not (Test-Path $dataDir) -or ((Get-ChildItem $dataDir -Recurse -ErrorAction SilentlyContinue) -eq $null)) {
            & (Join-Path $mysqlRoot.FullName 'bin\mysqld.exe') --initialize-insecure --basedir="$($mysqlRoot.FullName)" --datadir="$dataDir"
          }

      - name: Run smoke tests (optional)
        run: |
          $root = (Resolve-Path $env:BUILD_DIR).Path
          Start-Process -FilePath (Join-Path $root 'mysql\bin\mysqld.exe') -ArgumentList "--defaults-file=$($root)\mysql\my.ini" -NoNewWindow
          Start-Sleep -Seconds 6
          Start-Process -FilePath (Join-Path $root 'apache\bin\httpd.exe') -ArgumentList "-f",$root+"\apache\conf\httpd.conf" -NoNewWindow
          Start-Sleep -Seconds 6
          try {
            Invoke-WebRequest -UseBasicParsing -Uri "http://localhost:$env:APACHE_PORT/" -TimeoutSec 10 -ErrorAction Stop | Out-Null
            Invoke-WebRequest -UseBasicParsing -Uri "http://localhost:$env:APACHE_PORT/phpmyadmin/" -TimeoutSec 10 -ErrorAction Stop | Out-Null
          } finally {
            Stop-Process -Name httpd -Force -ErrorAction SilentlyContinue
            Stop-Process -Name mysqld -Force -ErrorAction SilentlyContinue
          }

      - name: Zip local bundle
        run: |
          $resolved = (Resolve-Path $env:BUILD_DIR).Path
          Compress-Archive -Path "$resolved\*" -DestinationPath $env:ARTIFACT_NAME -Force

      - name: Create release
        id: release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || 'local-build-' + github.run_number }}
          name: Local WAMP Build ${{ github.run_number }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release asset
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.release.outputs.upload_url }}
          asset_path: ${{ env:ARTIFACT_NAME }}
          asset_name: ${{ env:ARTIFACT_NAME }}
          asset_content_type: application/zip
